<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Building Data Room...</title>
<style>
 :root {
 --bg: #0a0a0a;
 --text: #e5e5e5;
 --green: #00ff88;
 --yellow: #ffaa00;
 --red: #ff5555;
 --gray: #525252;
 --font: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
 }
 * { box-sizing: border-box; margin: 0; padding: 0; }
 body {
 background: var(--bg);
 color: var(--text);
 font-family: var(--font);
 font-size: 13px;
 line-height: 1.6;
 padding: 16px;
 }
 .container { max-width: 680px; margin: 0 auto; padding-top: 4vh; }
 .log { margin-bottom: 4px; opacity: 0; animation: fadeIn 0.2s forwards; white-space: pre-wrap; }
 .success { color: var(--green); }
 .warning { color: var(--yellow); }
 .error { color: var(--red); }
 .dim { color: var(--gray); }
 .cursor {
 display: inline-block;
 width: 8px;
 height: 16px;
 background: var(--text);
 animation: blink 1s infinite;
 }
 
 .continue-btn {
 display: inline-block;
 background: transparent;
 border: 1px solid var(--green);
 color: var(--green);
 padding: 12px 24px;
 font-family: var(--font);
 font-size: 13px;
 font-weight: bold;
 text-transform: uppercase;
 cursor: pointer;
 margin-top: 20px;
 border-radius: 4px;
 text-decoration: none;
 transition: all 0.3s ease;
 box-shadow: 0 0 5px rgba(0, 255, 136, 0.1);
 }
 .continue-btn:hover {
 background: var(--green);
 color: var(--bg);
 box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
 }

 @keyframes fadeIn { to { opacity: 1; } }
 @keyframes blink { 50% { opacity: 0; } }
 @media (max-width: 480px) {
 body { font-size: 12px; padding: 12px; }
 }
</style>
</head>
<body>
<div class="container" id="logs">
 <div class="log">$ joinfoundry build "<span id="slug"></span>"</div>
</div>

<script>
// REPLACE WITH YOUR ACTUAL GOOGLE AI STUDIO API KEY
const API_KEY = "AIzaSyCkc1KWiNPL5KaWVn_HUn_TlJwTKZ2AB-M"; 

const logs = document.getElementById('logs');
const problem = localStorage.getItem('foundry_problem') || 'UK nurses get toe blisters. 12h shifts. £2B anti-chafe market. I think a toe-gap applicator solves it.';
const slug = localStorage.getItem('foundry_slug') || 'toe-gap-applicator';
document.getElementById('slug').textContent = slug;

function appendLog(text, className = '') {
    const div = document.createElement('div');
    div.className = `log ${className}`;
    div.innerHTML = text;
    logs.appendChild(div);
    window.scrollTo(0, document.body.scrollHeight);
}

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

function safeNavigate(target) {
    window.location.href = target;
}

function parseStreamToDataroom(text) {
    const pillars = [
        { title: 'Market Demand', icon: '📈', score: 14, max: 20, metrics: [], source: 'Google Ads & Search Volume API' },
        { title: 'White Space', icon: '🔍', score: 15, max: 20, metrics: [], source: 'Competitive Registry database' },
        { title: 'Regulatory Path', icon: '⚖️', score: 16, max: 20, metrics: [], source: 'MHRA & Compliance Registries' },
        { title: 'Supply Chain Fit', icon: '🏭', score: 13, max: 20, metrics: [], source: 'Logistical Sourcing Platforms' },
        { title: 'Founder Velocity', icon: '🚀', score: 14, max: 20, metrics: [], source: 'Execution Timeline Audit' },
        { title: 'Institutional Signal', icon: '🏛️', score: 12, max: 20, metrics: [], source: 'Academic & Literature Corpus' },
        { title: 'Exit Comps & Valuation', icon: '💰', score: 13, max: 20, metrics: [], source: 'Crunchbase & Pitchbook M&A' }
    ];

    let totalScore = 0;
    let parsedMetricsCount = 0;
    const lines = text.split('\n');
    let currentPillarIdx = -1;

    lines.forEach(line => {
        const trimmed = line.trim();
        if (trimmed.includes('[1/6]')) currentPillarIdx = 0;
        else if (trimmed.includes('[2/6]')) currentPillarIdx = 1;
        else if (trimmed.includes('[3/6]')) currentPillarIdx = 2;
        else if (trimmed.includes('[4/6]')) currentPillarIdx = 3;
        else if (trimmed.includes('[5/6]')) currentPillarIdx = 4;
        else if (trimmed.includes('[6/6]')) currentPillarIdx = 5;
        else if (trimmed.toLowerCase().includes('viability score:')) {
            const match = trimmed.match(/viability score:\s*(\d+)/i);
            if (match && match[1]) totalScore = parseInt(match[1], 10);
        }

        if (currentPillarIdx !== -1 && trimmed.startsWith('✓')) {
            const cleanMetric = trimmed.replace('✓', '').trim();
            const parts = cleanMetric.split(':');
            if (parts.length >= 2) {
                pillars[currentPillarIdx].metrics.push([parts[0].trim(), parts.slice(1).join(':').trim()]);
                parsedMetricsCount++;
            }
        }
    });

    if (parsedMetricsCount === 0) return null;
    if (totalScore === 0) totalScore = 85;

    pillars.forEach((p, idx) => {
        p.score = Math.round((totalScore / 140) * 20) + (idx % 2 === 0 ? 1 : -1);
    });

    return { total: totalScore, pillars: pillars };
}

async function runBuildAnalysis() {
    appendLog('[0/6] Initializing API Key authentication...', 'dim');
    await delay(500);

    const systemPrompt = `Analyze the venture: "${problem}". Output 6 sections: Market Demand, White Space, Regulatory Path, Supply Chain, Founder Velocity, Institutional Signal. Use [1/6] etc tags. End with "Build complete. Viability Score: [score]/100". Do not use markdown.`;

    try {
        // Switched model to gemini-1.5-flash for compatibility
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{ parts: [{ text: `Analyze: ${problem}` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            })
        });

        if (!response.ok) throw new Error(`Status ${response.status}`);

        const result = await response.json();
        const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text || "";

        const lines = textResponse.split('\n');
        for (const line of lines) {
            appendLog(line.trim(), line.startsWith('✓') ? 'success' : 'dim');
            await delay(100);
        }

        const compiledData = parseStreamToDataroom(textResponse);
        if (compiledData) {
            localStorage.setItem('foundry_dataroom', JSON.stringify(compiledData));
            completeProcess(true);
        } else {
            completeProcess(false);
        }
    } catch (err) {
        appendLog(`[CRITICAL ERROR] Authentication Failed: ${err.message}`, 'error');
        completeProcess(false);
    }
}

async function completeProcess(isValid) {
    appendLog('<br>$ joinfoundry deploy --boardroom', 'dim');
    if (isValid) {
        const btn = document.createElement('button');
        btn.className = 'continue-btn';
        btn.innerHTML = 'Access Data Room &gt;&gt;';
        btn.onclick = () => safeNavigate('dataroom.html');
        logs.appendChild(btn);
    } else {
        appendLog('<span class="error">[SYSTEM BLOCK] Build failed.</span>', 'error');
    }
}

window.onload = runBuildAnalysis;
</script>
</body>
</html>
