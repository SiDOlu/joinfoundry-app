 width: 8px;
 height: 16px;
 background: var(--text);

 }
 @keyframes fadeIn { to { opacity: 1; } }
 @keyframes blink { 50% { opacity: 0; } }
 @media (max-width: 480px) {
 body { font-size: 12px; padding: 12px; }
 }

function appendLog(text, className = '') {
    const div = document.createElement('div');
    div.className = `log ${className}`;
    div.innerHTML = text;
    logs.appendChild(div);
    window.scrollTo(0, document.body.scrollHeight);
}

// Safe navigation helper that prevents base-resolution errors inside sandboxed iframes
function safeNavigate(target) {
    try {
        if (window.location.href && window.location.href !== "about:blank" && window.location.href !== "about:srcdoc") {
            window.location.href = new URL(target, window.location.href).href;
        } else {
            window.location.href = target;
        }
    } catch (e) {
        console.error("Navigation failed, applying interactive on-screen fallback", e);
        appendLog(`\n<span class="warning">[Sandbox Warning] Automatic redirection blocked by iframe constraints.</span>`, 'warning');
        appendLog(`👉 <a href="${target}" style="color:var(--green); font-weight:bold; text-decoration:underline;">Click here to open ${target} manually</a>`, 'success');
    }
}

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// Exponential backoff fetch helper
async function fetchWithRetry(url, options, retries = 5, delayMs = 1000) {
    try {
        const response = await fetch(url, options);
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        return await response.json();
    } catch (error) {
        if (retries <= 0) {
            throw error;
        }
        await delay(delayMs);
        return fetchWithRetry(url, options, retries - 1, delayMs * 2);
    }
}

async function runSynthesis() {
    await delay(300);
    appendLog('[1/7] Sifting neural concept vectors...', 'dim');
    await delay(400);
    appendLog('[2/7] Negotiating secure credential handshake...', 'dim');
    await delay(300);

    if (!GEMINI_API_KEY || GEMINI_API_KEY.includes("YOUR_")) {
        appendLog('[CRITICAL ERROR] Gemini API Authorization Token is undefined.', 'error');
        triggerFallback();
        return;
    }

    // Dynamic schema validation criteria for 7 data room pillars
    const schema = {
        type: "OBJECT",
        properties: {
            total: { type: "INTEGER" },
            pillars: {
                type: "ARRAY",
                items: {
                    type: "OBJECT",
                    properties: {
                        title: { type: "STRING" },
                        icon: { type: "STRING" },
                        score: { type: "INTEGER" },
                        max: { type: "INTEGER" },
                        metrics: {
                            type: "ARRAY",
                            items: {
                                type: "ARRAY",
                                items: { type: "STRING" }
                            }
                        },
                        source: { type: "STRING" },
                        terminalLog: { type: "STRING" }
                    },
                    required: ["title", "icon", "score", "max", "metrics", "source", "terminalLog"]
                }
            }
        },
        required: ["total", "pillars"]
    };

    const systemPrompt = `You are the synthesis engine of JoinFoundry. Analyze the user's venture idea and build a structured report.
    You MUST output exactly 7 pillars in the JSON schema, matching these titles and icons:
    1. 'Market Demand' (📈)
    2. 'White Space' (🔍)
    3. 'Regulatory Path' (⚖️)
    4. 'Supply Chain Fit' (🏭)
    5. 'Founder Velocity' (🚀)
    6. 'Institutional Signal' (🏛️)
    7. 'Exit Comps & Valuation' (💰)

    For each pillar:
    - Provide a score out of 20.
    - Under metrics, output exactly 3 key-value arrays (e.g., [["Monthly Searches", "45,000"], ...]) customized to the venture.
    - Write a short terminal log sentence for "terminalLog" (e.g., " ✓ Found 12 candidate manufacturers in UK region").`;

    // DETECT CREDENTIAL TYPE:
    // AI Studio API keys begin with 'AIzaSy'. Anything else is processed as an OAuth Bearer Token.
    const isStandardApiKey = GEMINI_API_KEY.startsWith("AIzaSy");
    
    const url = isStandardApiKey
        ? `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`
        : `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent`;

    const headers = { 
        'Content-Type': 'application/json' 
    };

    // Bind token to Bearer Authorization Header if it's a service account token
    if (!isStandardApiKey) {
        headers['Authorization'] = `Bearer ${GEMINI_API_KEY}`;
    }

    try {
        const payload = {
            contents: [{ parts: [{ text: `Venture Idea: "${problem}"` }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: {
                responseMimeType: "application/json",
                responseSchema: schema
            }
        };

        const result = await fetchWithRetry(url, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(payload)
        });

        const rawText = result?.candidates?.[0]?.content?.parts?.[0]?.text;
        if (!rawText) {
            throw new Error("Invalid response format received from model gateway.");
        }

        const data = JSON.parse(rawText);

        // Step-by-step terminal execution stream
        for (let idx = 0; idx < data.pillars.length; idx++) {
            const pillar = data.pillars[idx];
            appendLog(`[${idx + 1}/7] Structuring ${pillar.title.toLowerCase()} dataset...`, 'dim');
            await delay(450);
            appendLog(pillar.terminalLog || ` ✓ Diligence metrics mapped for ${pillar.title}`, 'success');
            await delay(250);
        }

        localStorage.setItem('foundry_dataroom', JSON.stringify(data));
        
        appendLog(`\nBuild complete. Dynamic Viability Score: ${data.total}/140`, 'success');
        completeProcess();

    } catch (err) {
        console.error("Diligence mapping error:", err);
        appendLog(`\n[!] Credentials mismatch. Error details: ${err.message}`, 'error');
        triggerFallback();
    }
}

async function completeProcess() {

}

window.onload = function() {
