<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Room | JoinFoundry</title>
<style>
:root {
--bg: #0a0a0b;
--card: #151517;
--border: #2a2a2d;
--text: #e5e5e7;
--muted: #8a8a8e;
--accent: #0a84ff;
--green: #30d158;
--yellow: #ffd60a;
--red: #ff453a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
background: var(--bg);
color: var(--text);
padding: 20px;
line-height: 1.6;
}
.container {
max-width: 900px;
margin: 0 auto;
}
.header {
margin-bottom: 32px;
padding-bottom: 16px;
border-bottom: 1px solid var(--border);
}
.header h1 {
font-size: 24px;
font-weight: 600;
}
.header p {
color: var(--muted);
font-size: 14px;
margin-top: 4px;
}
.problem-box {
background: var(--card);
border: 1px solid var(--border);
border-radius: 12px;
padding: 16px;
margin-bottom: 24px;
font-size: 14px;
color: var(--muted);
}
.score-banner {
background: linear-gradient(135deg, var(--accent), #5e5ce6);
border-radius: 12px;
padding: 24px;
margin-bottom: 24px;
text-align: center;
}
.score-banner h2 {
font-size: 14px;
text-transform: uppercase;
letter-spacing: 1px;
opacity: 0.8;
margin-bottom: 8px;
}
.score-banner.score {
font-size: 48px;
font-weight: 700;
}
.score-banner.label {
font-size: 14px;
opacity: 0.9;
}
.grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 16px;
margin-bottom: 32px;
}
.pillar-card {
background: var(--card);
border: 1px solid var(--border);
border-radius: 12px;
padding: 18px;
transition: 0.2s;
}
.pillar-card:hover {
border-color: var(--accent);
}
.pillar-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 12px;
}
.pillar-title {
display: flex;
align-items: center;
gap: 8px;
font-weight: 600;
font-size: 15px;
}
.pillar-score {
font-weight: 700;
font-size: 18px;
}
.score-high { color: var(--green); }
.score-med { color: var(--yellow); }
.score-low { color: var(--red); }
.pillar-body {
font-size: 14px;
color: var(--muted);
}
.metric {
display: flex;
justify-content: space-between;
padding: 8px 0;
border-bottom: 1px solid var(--border);
}
.metric:last-child { border-bottom: none; }
.metric-value {
color: var(--text);
font-weight: 600;
}
.source {
font-size: 12px;
color: var(--muted);
margin-top: 8px;
font-style: italic;
}
.actions {
display: flex;
gap: 12px;
margin-top: 32px;
}
.btn {
flex: 1;
padding: 14px;
border-radius: 12px;
border: none;
font-weight: 600;
cursor: pointer;
font-size: 15px;
}
.btn-primary {
background: var(--accent);
color: white;
}
.btn-secondary {
background: var(--card);
color: var(--text);
border: 1px solid var(--border);
}
.btn:hover { opacity: 0.9; }
@media (max-width: 600px) {
.grid { grid-template-columns: 1fr; }
.actions { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Data Room</h1>
<p>Auto-generated diligence report</p>
</div>

<div class="problem-box" id="problemText">
Loading problem statement...
</div>

<div class="score-banner">
<h2>Viability Score</h2>
<div class="score" id="totalScore">--</div>
<div class="label" id="scoreLabel">Analyzing...</div>
</div>

<div class="grid" id="pillarsGrid">
<!-- Pillars injected by JS -->
</div>

<div class="actions">
<button class="btn btn-primary" onclick="deployToBoardroom()">Deploy to Boardroom</button>
<button class="btn btn-secondary" onclick="window.location.href='/'">New Project</button>
</div>
</div>

<script>
const PROBLEM_TEXT = localStorage.getItem('foundry_problem') || 'No problem found. Go back to /';

if (!localStorage.getItem('foundry_problem')) {
window.location.href = '/';
}

document.getElementById('problemText').textContent = PROBLEM_TEXT;

// Mock data generator - replace with real API calls later
function generatePillars(text) {
// Pillar 1: Market Demand
const demandVol = Math.floor(Math.random() * 50000) + 5000;
const demandScore = demandVol > 20000? 18 : demandVol > 5000? 12 : 6;

// Pillar 2: White Space
const whiteSpaceScore = Math.floor(Math.random() * 5) + 15;

// Pillar 3: Regulatory
const regScore = text.toLowerCase().includes('medical')? 8 : 18;

// Pillar 4: Supply Chain
const supplyScore = Math.floor(Math.random() * 6) + 12;

// Pillar 5: Founder Velocity
const founderScore = Math.floor(Math.random() * 8) + 10;

// Pillar 6: Institutional Signal
const instScore = Math.floor(Math.random() * 7) + 11;

// Pillar 7: Valuation
const multiple = (Math.random() * 3 + 3).toFixed(1);
const theoreticalExit = Math.floor(demandVol * 0.1 * multiple / 1000) * 1000;
const valScore = multiple > 5? 18 : multiple > 3? 14 : 8;

const total = demandScore + whiteSpaceScore + regScore + supplyScore + founderScore + instScore + valScore;

return {
total,
pillars: [
{
title: 'Market Demand',
icon: '📈',
score: demandScore,
max: 20,
metrics: [
['Monthly Searches', demandVol.toLocaleString()],
['Competition', demandVol > 20000? 'Medium' : 'Low'],
['Est. CPC', '£0.85 - £2.40']
],
source: 'Google Ads API'
},
{
title: 'White Space',
icon: '🔍',
score: whiteSpaceScore,
max: 20,
metrics: [
['Retailer SKUs', '0 found'],
['Avg Rating', '3.2★ on Amazon'],
['Top Complaint', 'Does not reach gaps']
],
source: 'Amazon, Boots, Apify'
},
{
title: 'Regulatory Path',
icon: '⚖️',
score: regScore,
max: 20,
metrics: [
['Classification', regScore > 15? 'Cosmetic' : 'Medical Device'],
['Timeline', regScore > 15? '6-8 weeks' : '12-18 months'],
['Docs Needed', regScore > 15? 'CPNP' : 'CE Mark, ISO 13485']
],
source: 'MHRA, CPNP, openFDA'
},
{
title: 'Supply Chain Fit',
icon: '🏭',
score: supplyScore,
max: 20,
metrics: [
['Factories Found', '12'],
['MOQ', '500 units'],
['Landed Cost', '£2.80/unit']
],
source: 'Alibaba, Kompass'
},
{
title: 'Founder Velocity',
icon: '🚀',
score: founderScore,
max: 20,
metrics: [
['LinkedIn Activity', '8 posts/90d'],
['Domain Expertise', 'High'],
['Prev Experience', '2 exits']
],
source: 'LinkedIn, Companies House'
},
{
title: 'Institutional Signal',
icon: '🏛️',
score: instScore,
max: 20,
metrics: [
['PubMed Studies', '3 RCTs'],
['NHS Mentions', '2'],
['Uni Labs', 'Leeds Podiatry']
],
source: 'PubMed, NHS.uk'
},
{
title: 'Exit Comps & Valuation',
icon: '💰',
score: valScore,
max: 20,
metrics: [
['Exit Multiple', `${multiple}x Revenue`],
['Comparable Exit', 'Scholl → Reckitt £2.1B [2014]'],
['Theoretical Exit', `£${theoreticalExit}K`]
],
source: 'Crunchbase, Beauhurst'
}
]
};
}

function renderPillars(data) {
document.getElementById('totalScore').textContent = data.total;

let label = 'Low';
if (data.total > 80) label = 'High — Boardroom Ready';
else if (data.total > 60) label = 'Medium — Needs Work';

document.getElementById('scoreLabel').textContent = label;

const grid = document.getElementById('pillarsGrid');
grid.innerHTML = data.pillars.map(p => {
const scoreClass = p.score > 15? 'score-high' : p.score > 10? 'score-med' : 'score-low';
return `
<div class="pillar-card">
<div class="pillar-header">
<div class="pillar-title">
<span>${p.icon}</span>
<span>${p.title}</span>
</div>
<div class="pillar-score ${scoreClass}">${p.score}/${p.max}</div>
</div>
<div class="pillar-body">
${p.metrics.map(m => `
<div class="metric">
<span>${m[0]}</span>
<span class="metric-value">${m[1]}</span>
</div>
`).join('')}
<div class="source">Source: ${p.source}</div>
</div>
</div>
`;
}).join('');
}

function deployToBoardroom() {
localStorage.setItem('foundry_score', document.getElementById('totalScore').textContent);
window.location.href = '/boardroom.html';
}

// Run
const data = generatePillars(PROBLEM_TEXT);
renderPillars(data);
localStorage.setItem('foundry_dataroom', JSON.stringify(data));
</script>
</body>
</html>
